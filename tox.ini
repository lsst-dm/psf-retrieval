[tox]
envlist = py,coverage-report,typing,lint
isolated_build = True

[docker:postgres]
image = postgres:latest
environment =
    POSTGRES_PASSWORD=INSECURE-PASSWORD
    POSTGRES_USER=psf-retrieval
    POSTGRES_DB=psf-retrieval
# The healthcheck ensures that tox-docker won't run tests until the
# container is up and the command finishes with exit code 0 (success)
healthcheck_cmd = PGPASSWORD=$POSTGRES_PASSWORD psql \
    --user=$POSTGRES_USER --dbname=$POSTGRES_DB \
    --host=127.0.0.1 --quiet --no-align --tuples-only \
    -1 --command="SELECT 1"
healthcheck_timeout = 1
healthcheck_retries = 30
healthcheck_interval = 1
healthcheck_start_period = 1

[testenv]
description = Run pytest against {envname}.
deps =
    -r{toxinidir}/requirements/main.txt
    -r{toxinidir}/requirements/dev.txt
commands =
    pytest --cov=psfretrieval --cov-branch --cov-report= {posargs}

[testenv:coverage-report]
description = Compile coverage from each test run.
skip_install = true
deps = coverage[toml]>=5.0.2
depends =
    py
commands = coverage report

[testenv:py]
docker =
    postgres
setenv =
    PSF_RETRIEVAL_DATABASE_URL = postgresql://psf-retrieval@localhost/psf-retrieval
    PSF_RETRIEVAL_DATABASE_PASSWORD = INSECURE-PASSWORD
    PSF_RETRIEVAL_ARQ_QUEUE_URL = redis://localhost/0
    PSF_RETRIEVAL_SERVICE_ACCOUNT = psf-retrieval@example.com
    PSF_RETRIEVAL_STORAGE_URL = gs://some-bucket

[testenv:typing]
description = Run mypy.
commands =
    mypy src/psfretrieval tests

[testenv:lint]
description = Lint codebase by running pre-commit
skip_install = true
deps =
    pre-commit
commands = pre-commit run --all-files

[testenv:run]
description = Run the development server with auto-reload for code changes.
usedevelop = true
commands = uvicorn psfretrieval.main:app --reload
